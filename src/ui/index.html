<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>browser.cpp</title>
  <!-- styles.css is injected by webpack (MiniCssExtractPlugin) -->
</head>
<body>
  <div id="app">

    <!-- ── Toolbar ──────────────────────────────────────────────────────── -->
    <header id="toolbar">
      <span id="toolbar-brand">browser.cpp</span>

      <div id="toolbar-file-actions">
        <button id="btn-open"  title="Open folder"><span class="codicon codicon-folder-opened"></span> Open</button>
        <button id="btn-save"  title="Save file">Save</button>
        <button id="btn-save-as" title="Save As…">Save As…</button>
      </div>

      <div class="toolbar-sep"></div>

      <div id="toolbar-build-actions">
        <label for="cpp-standard" class="sr-only">C++ standard</label>
        <select id="cpp-standard" title="C++ standard">
          <option value="c++20" selected>C++20</option>
          <option value="c++17">C++17</option>
          <option value="c++14">C++14</option>
        </select>

        <button id="btn-compile" title="Compile  (Ctrl+Shift+B)"><span class="codicon codicon-tools"></span> Compile</button>
        <button id="btn-compile-run" class="btn-primary" title="Compile and Run  (F5)">
          ▶ Compile and Run
        </button>
      </div>

      <div id="toolbar-status" aria-live="polite"></div>
    </header>

    <!-- ── Main ─────────────────────────────────────────────────────────── -->
    <div id="main">

      <!-- File explorer -->
      <aside id="sidebar">
        <div class="panel-header">
          <span>EXPLORER</span>
          <button id="btn-new" title="New file  (Ctrl+N)" aria-label="New file" class="panel-header-btn"><span class="codicon codicon-new-file" aria-hidden="true"></span></button>
        </div>
        <ul id="file-tree" role="tree" aria-label="Open files"></ul>
      </aside>

      <!-- Editor + terminal workspace -->
      <div id="workspace">
        <!-- Open-file tab bar -->
        <div id="tab-bar" role="tablist"></div>

        <!-- Monaco editor -->
        <div id="editor-container" role="main"></div>

        <!-- Resizable terminal panel -->
        <div id="terminal-panel">
          <div id="terminal-panel-header">
            <div class="terminal-title">
              <span>TERMINAL</span>
              <button id="btn-stop-run" class="terminal-stop-btn" title="Stop running program (Ctrl+C)" disabled>
                <svg
                  class="terminal-stop-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M14.897 1a4 4 0 0 1 2.664 1.016l.165 .156l4.1 4.1a4 4 0 0 1 1.168 2.605l.006 .227v5.794a4 4 0 0 1 -1.016 2.664l-.156 .165l-4.1 4.1a4 4 0 0 1 -2.603 1.168l-.227 .006h-5.795a3.999 3.999 0 0 1 -2.664 -1.017l-.165 -.156l-4.1 -4.1a4 4 0 0 1 -1.168 -2.604l-.006 -.227v-5.794a4 4 0 0 1 1.016 -2.664l.156 -.165l4.1 -4.1a4 4 0 0 1 2.605 -1.168l.227 -.006h5.793zm-2.887 14l-.127 .007a1 1 0 0 0 0 1.986l.117 .007l.127 -.007a1 1 0 0 0 0 -1.986l-.117 -.007zm-.01 -8a1 1 0 0 0 -.993 .883l-.007 .117v4l.007 .117a1 1 0 0 0 1.986 0l.007 -.117v-4l-.007 -.117a1 1 0 0 0 -.993 -.883z" />
                </svg>
                <span>STOP!</span>
              </button>
            </div>
            <div class="panel-controls">
              <button id="btn-clear-terminal" title="Clear terminal (Ctrl+K)">⌫</button>
              <button id="btn-toggle-terminal" title="Toggle terminal">▾</button>
            </div>
          </div>
          <!-- xterm.js mounts here -->
          <div id="terminal-container"></div>
        </div>
      </div>
    </div>

    <!-- ── Status bar ────────────────────────────────────────────────────── -->
    <footer id="statusbar">
      <span id="status-compiler" class="status-item">Initialising compiler…</span>
      <span id="status-file"     class="status-item"></span>
      <span id="status-cursor"   class="status-item">Ln 1, Col 1</span>
    </footer>

  </div>
  <!-- bundle.js injected by HtmlWebpackPlugin -->
</body>
</html>
