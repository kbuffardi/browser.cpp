name: Release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-release-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean release workspace
        run: npm run release:clean

      - name: Fetch Clang artifacts
        run: npm run fetch-clang

      - name: Run linter
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Verify release version sync
        run: npm run release:check-version

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Package release artifacts
        run: npm run package:release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-cpp-release-${{ github.ref_name }}
          path: release/*
