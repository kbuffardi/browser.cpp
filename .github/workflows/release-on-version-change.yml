name: Release candidate on version bump

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build-release-candidate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect manifest version bump
        id: detect_version
        run: |
          node scripts/detect-manifest-version-change.js "${{ github.event.pull_request.base.sha }}" HEAD --github-output >> "$GITHUB_OUTPUT"

      - name: Stop when version did not change
        if: steps.detect_version.outputs.changed != 'true'
        run: echo "manifest.json version did not change; skipping release candidate build."

      - name: Clean release workspace
        if: steps.detect_version.outputs.changed == 'true'
        run: npm run release:clean

      - name: Fetch Clang artifacts
        if: steps.detect_version.outputs.changed == 'true'
        run: npm run fetch-clang

      - name: Run linter
        if: steps.detect_version.outputs.changed == 'true'
        run: npm run lint

      - name: Build project
        if: steps.detect_version.outputs.changed == 'true'
        run: npm run build

      - name: Verify release version sync
        if: steps.detect_version.outputs.changed == 'true'
        run: npm run release:check-version

      - name: Run end-to-end tests
        if: steps.detect_version.outputs.changed == 'true'
        run: npm run test:e2e

      - name: Package release artifacts
        if: steps.detect_version.outputs.changed == 'true'
        run: npm run package:release

      - name: Upload release artifacts
        if: steps.detect_version.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: browser-cpp-release-candidate-v${{ steps.detect_version.outputs.head_version }}
          path: release/*
